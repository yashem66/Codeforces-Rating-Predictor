<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRP Settings</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        min-width: 220px;
        padding: 12px 16px;
        margin: 0;
      }
      h2 {
        font-size: 14px;
        margin: 0 0 10px;
        color: #333;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      #status {
        margin-top: 8px;
        font-size: 11px;
        color: #888;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <h2>Rating Predictor</h2>
    <label>
      <input type="checkbox" id="showRating" />
      Show Rating column
    </label>
    <label>
      <input type="checkbox" id="showDelta" />
      Show Pred Δ column
    </label>
    <label
      title="Scrape standings from page HTML and predict from DOM ranks. Finished contests still use ratingChanges oldRating as the rating baseline."
    >
      <input type="checkbox" id="debugForceDomPredict" />
      Debug: force DOM scrape
    </label>
    <div id="status"></div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
